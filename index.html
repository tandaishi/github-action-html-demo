<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记录板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
    }
    .card {
      background: #fff;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    input {
      padding: 10px 14px;
      font-size: 16px;
      border: 1px solid #d1d1d6;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
      width: 240px;
    }
    input:focus { border-color: #007aff; }

    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #888;
      min-height: 20px;
    }
    #status.loading { color: #007aff; }
    #status.done { color: #34c759; }
    #status.error { color: #ff3b30; }

    .records {
      margin-top: 32px;
      width: 100%;
      max-width: 520px;
    }
    .records-title {
      font-size: 14px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e0e0e0;
    }
    .record {
      background: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      display: flex;
      gap: 12px;
      align-items: baseline;
      font-size: 15px;
      animation: fadeIn 0.3s ease;
    }
    .record .rtime {
      color: #888;
      font-size: 12px;
      font-family: "SF Mono", Menlo, monospace;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .record .rtext { color: #1d1d1f; word-break: break-all; }
    .records-empty {
      color: #aaa;
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="card">
    <input type="text" id="inputField" placeholder="按 Enter 提交..." autofocus>
  </div>

  <div id="status"></div>

  <div class="records" id="recordsContainer">
    <div class="records-title">📋 历史记录</div>
    <div id="recordsList">
          <div class="record"><span class="rtime">2026-05-24 04:26:46</span><span class="rtext">谭代师测试记录1</span></div>
      <!-- __RECORDS_MARKER__ -->
    </div>
  </div>

  <script>
    const OWNER = 'tandaishi';
    const REPO  = 'github-action-html-demo';
    const PAT   = '__PAT__';

    const input    = document.getElementById('inputField');
    const statusEl = document.getElementById('status');

    // ── 触发 GitHub Action ──────────────────────────
    async function triggerAction(value) {
      const url = `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/record.yml/dispatches`;
      const res = await fetch(url, {
        method: 'POST',
        headers: {
          'Accept': 'application/vnd.github.v3+json',
          'Authorization': `Bearer ${PAT}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ ref: 'main', inputs: { value } }),
      });
      if (!res.ok) {
        const errText = await res.text().catch(() => '');
        throw new Error(`GitHub API ${res.status}: ${errText}`);
      }
    }

    async function onSubmit() {
      const value = input.value.trim();
      if (!value) return;

      input.disabled = true;
      statusEl.className = 'loading';
      statusEl.textContent = '⏳ 正在提交...';

      try {
        await triggerAction(value);
        statusEl.className = 'done';
        statusEl.textContent = '✅ 提交成功，刷新页面可看到结果';
        input.value = '';
      } catch (err) {
        statusEl.className = 'error';
        statusEl.textContent = `❌ 提交失败：${err.message}`;
      } finally {
        input.disabled = false;
        input.focus();
      }
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') onSubmit();
    });
  </script>
</body>
</html>
