<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简约示例</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
    }
    .card {
      background: #fff;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: flex;
      gap: 12px;
      align-items: center;
    }
    input {
      padding: 10px 14px;
      font-size: 16px;
      border: 1px solid #d1d1d6;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
      width: 240px;
    }
    input:focus {
      border-color: #007aff;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #007aff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #0056b3;
    }
    button:active {
      background: #004080;
    }
  </style>
</head>
<body>
  <div class="card">
    <input type="text" id="inputField" placeholder="输入点什么..." autofocus>
    <button id="alertBtn">OK</button>
  </div>

  <script>
    const input = document.getElementById('inputField');
    const btn = document.getElementById('alertBtn');

    function showAlert() {
      alert(input.value);
    }

    btn.addEventListener('click', showAlert);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') showAlert();
    });
  </script>
</body>
</html>
