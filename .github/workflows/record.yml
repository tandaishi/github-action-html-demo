name: Record Input

on:
  workflow_dispatch:
    inputs:
      value:
        description: '输入内容'
        required: true
        type: string
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Append record to index.html
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          python3 << 'PYEOF'
          import os, html
          from datetime import datetime

          value = os.environ.get('INPUT_VALUE', '')
          escaped = html.escape(value)
          ts = datetime.now().strftime('%Y-%m-%d %H:%M:%S')

          record = f'    <div class="record"><span class="rtime">{ts}</span><span class="rtext">{escaped}</span></div>'

          with open('index.html', 'r') as f:
              content = f.read()

          content = content.replace('<!-- __RECORDS_MARKER__ -->', f'{record}\n      <!-- __RECORDS_MARKER__ -->')

          with open('index.html', 'w') as f:
              f.write(content)
          PYEOF
        env:
          INPUT_VALUE: ${{ github.event.inputs.value }}

      - name: Commit and push
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || (
            git remote set-url origin https://x-access-token:${{ secrets.PAT }}@github.com/${{ github.repository }}
            git commit -m "Add record: ${{ github.event.inputs.value }}"
            git push
          )

      - name: Inject PAT for deployment
        run: sed -i "s|__PAT__|${{ secrets.PAT }}|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
